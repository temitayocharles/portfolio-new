name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Advisory defense-in-depth scan. GitGuardian is the blocking PR secret scanner.
  gitleaks:
    runs-on: portfolio-new-workloads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Gitleaks against current tree
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --redact --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
