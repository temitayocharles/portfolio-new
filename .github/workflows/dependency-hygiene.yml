name: Dependency Hygiene

on:
  schedule:
    - cron: "0 8 * * 1"
  pull_request:
    paths:
      - "backend/requirements.txt"
      - "frontend/package.json"
      - "frontend/yarn.lock"
      - ".github/workflows/dependency-hygiene.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-audit:
    runs-on: portfolio-new-workloads
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Yarn audit report
        run: yarn audit --level high --groups dependencies > ../frontend-yarn-audit.txt || true

      - name: Upload frontend audit report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-yarn-audit
          path: frontend-yarn-audit.txt
          if-no-files-found: error

  backend-audit:
    runs-on: portfolio-new-workloads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Generate backend dependency audit report
        run: pip-audit -r backend/requirements.txt --format=json --output=backend-pip-audit.json || true

      - name: Upload backend audit report
        uses: actions/upload-artifact@v7
        with:
          name: backend-pip-audit
          path: backend-pip-audit.json
          if-no-files-found: error
