name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "netlify.toml"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "netlify.toml"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-ci:
    runs-on: portfolio-new-workloads
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable || true

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run portfolio static QA
        run: yarn qa:portfolio

      - name: Run React unit test suite
        run: yarn test:ci

      - name: Build frontend
        run: yarn build
        env:
          REACT_APP_BACKEND_URL: https://api.temitayocharles.online
