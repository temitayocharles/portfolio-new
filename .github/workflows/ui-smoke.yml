name: UI Smoke Tests

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ui-smoke.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ui-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: portfolio-new-workloads
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright test runner package
        run: npm install --no-save --legacy-peer-deps @playwright/test@1.59.1

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: ./node_modules/.bin/playwright test
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
