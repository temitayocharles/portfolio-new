name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "backend_test.py"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "backend_test.py"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: portfolio-new-workloads

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: portfolio_ci
      ADMIN_API_KEY: ci-admin-key
      CONTACT_RATE_LIMIT_WINDOW_SECONDS: "60"
      CONTACT_RATE_LIMIT_MAX_REQUESTS: "5"
      MAX_CONTACT_LIST_LIMIT: "500"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Compile backend source
        run: python -m py_compile backend/server.py backend_test.py

      - name: Run backend contract tests
        run: pytest -q backend/tests
