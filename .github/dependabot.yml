version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        dependency-type: production
      frontend-development:
        dependency-type: development

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: America/Toronto
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: America/Toronto
    open-pull-requests-limit: 5
