<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
<title id="title">ForgeWatch Iris Jerry Operator Loop</title>
<desc id="desc">A diagram showing ForgeWatch as operational intelligence, Iris as governed personal AI assistant, and Jerry as the mobile AI companion.</desc>
<rect width="1440" height="860" fill="#080d12"/>
<rect x="78" y="74" width="1284" height="712" rx="42" fill="#0a0f14" stroke="#263241"/>
<text x="124" y="140" fill="#f8fafc" font-family="Inter, Arial" font-size="42" font-weight="800">Operator loop</text>
<text x="126" y="176" fill="#94a3b8" font-family="Inter, Arial" font-size="18">Signals, personal work, and mobile access stay connected without collapsing into one product.</text>
<g font-family="Inter, Arial">
  <rect x="134" y="278" width="330" height="230" rx="34" fill="#111827" stroke="#14b8a6" stroke-width="2"/>
  <text x="176" y="338" fill="#f8fafc" font-size="28" font-weight="800">ForgeWatch</text>
  <text x="176" y="374" fill="#2dd4bf" font-size="14">Operational intelligence</text>
  <text x="176" y="420" fill="#94a3b8" font-size="15">Watches metrics, incidents, alerts, KeepHQ events, Kubernetes state, and service health.</text>

  <rect x="555" y="238" width="330" height="310" rx="34" fill="#101419" stroke="#f59e0b" stroke-width="2"/>
  <text x="598" y="302" fill="#f8fafc" font-size="28" font-weight="800">Project Iris</text>
  <text x="598" y="338" fill="#fbbf24" font-size="14">Governed personal AI assistant</text>
  <text x="598" y="386" fill="#94a3b8" font-size="15">Manages everyday digital work through memory, approvals, tools, MCP, email, calendar, browser workflows, artifacts, audit, and long-running tasks.</text>

  <rect x="976" y="278" width="330" height="230" rx="34" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="1018" y="338" fill="#f8fafc" font-size="28" font-weight="800">Jerry</text>
  <text x="1018" y="374" fill="#fbbf24" font-size="14">Mobile AI companion</text>
  <text x="1018" y="420" fill="#94a3b8" font-size="15">Provides quick commands, status checks, approvals, alert review, and lightweight assistant interaction.</text>

  <path d="M464 394H555" stroke="#475569" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M885 394H976" stroke="#475569" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M1138 508C1060 640 877 692 720 692C563 692 380 640 302 508" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="8 10"/>

  <rect x="398" y="632" width="644" height="82" rx="24" fill="#0f1720" stroke="#374151"/>
  <text x="444" y="680" fill="#f8fafc" font-size="19" font-weight="700">InfraForge Platform supplies the secure runtime foundation.</text>
</g>
<text x="124" y="760" fill="#64748b" font-family="Inter, Arial" font-size="14">temitayocharles.online · ForgeWatch · Iris · Jerry operator-loop proof asset</text>
